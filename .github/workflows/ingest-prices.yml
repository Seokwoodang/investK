name: Ingest KR prices (daily)

# 백테스트용 국내주식 일별 종가를 장 마감 후 매일 증분 수집(kr_prices).
# 과거 다년치 백필은 1회성이라 여기 두지 않는다(로컬 dev에서 mode=backfill로 실행).
on:
  schedule:
    - cron: '10 9 * * 1-5' # 09:10 UTC = 18:10 KST · 평일(장 마감 후)
  workflow_dispatch: {} # 수동 실행 버튼

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Call price-ingest (daily append)
        run: |
          curl -fsS --max-time 120 --retry 2 --retry-delay 30 -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://investk.app/api/cron/price-ingest?mode=daily&n=200"
