name: Post to Instagram (briefing)

# 아침 시장 브리핑 캐러셀 5장을 인스타그램에 자동 게시(브리핑 갱신 ~30분 뒤).
# KST 06:30 = 21:30(전일) UTC.
on:
  schedule:
    - cron: '30 21 * * *' # 06:30 KST — 아침 시장 브리핑
  workflow_dispatch:
    inputs:
      type:
        description: '게시 종류(daily=브리핑 5장)'
        default: 'daily'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Publish briefing carousel
        run: |
          curl -fsS --max-time 110 --retry 1 --retry-delay 20 -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://investk.app/api/ig/publish?type=${{ github.event.inputs.type || 'daily' }}"
