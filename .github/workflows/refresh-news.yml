name: Refresh news (6h)

# GitHub Actions(무료)로 6시간마다 /api/cron/news를 호출해 서버가 RSS+AI로 뉴스를 생성·Supabase에 저장한다.
# 사용자는 항상 Supabase 캐시를 즉시 읽기만 한다.
on:
  schedule:
    # UTC 03·09·15·21 = KST 12·18·24·06 (하루 4회, 6시간 간격)
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch: {} # 수동 실행 버튼

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call news refresh endpoint
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://invest-seokwoodangs-projects.vercel.app/api/cron/news"
