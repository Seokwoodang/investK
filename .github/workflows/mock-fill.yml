name: Mock limit fill (1m)

# 지정가 미체결 주문을 ~1분마다 현재가로 체결 시도(사용자 부재 시에도 체결되게).
# GitHub 스케줄은 최소 5분 간격이라, 매시 실행되는 잡 안에서 60초마다 반복 호출해 사실상 1분 간격을 만든다.
# (공개 레포라 Actions 무제한 무료 — 잡이 ~57분 도는 비용 문제 없음)
on:
  schedule:
    - cron: '0 * * * *' # 매시 정각 시작 → 내부 루프가 60초마다 호출
  workflow_dispatch: {}

concurrency:
  group: mock-fill
  cancel-in-progress: false

jobs:
  fill:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - name: Fill loop (~60s interval for ~57min)
        run: |
          END=$((SECONDS + 3420)) # 약 57분 (다음 정각 트리거 전에 종료 → 겹침 방지)
          while [ $SECONDS -lt $END ]; do
            curl -fsS --max-time 50 -X GET \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "https://investk.app/api/cron/mock-fill" || true
            sleep 60
          done
